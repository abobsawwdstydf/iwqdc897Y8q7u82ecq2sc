<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>408 - Превышено время ожидания | Nimbus</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 1;
        }
        h1 {
            font-size: 120px;
            font-weight: 900;
            background: linear-gradient(135deg, #dd6b20 0%, #c05621 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            animation: flicker 3s ease-in-out infinite;
        }
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
            52% { opacity: 1; }
            54% { opacity: 0.5; }
        }
        h2 { font-size: 32px; margin-bottom: 16px; }
        p { color: #a0aec0; font-size: 18px; margin-bottom: 32px; }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: spin 4s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .timer {
            font-size: 24px;
            color: #dd6b20;
            margin-top: 20px;
        }
        .author {
            margin-top: 40px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⏱️</div>
        <h1>408</h1>
        <h2>Превышено время ожидания</h2>
        <p>Сервер отвечает слишком долго</p>
        <a href="/" class="btn">Попробовать снова</a>
        <div class="timer" id="timer">00:00</div>
        <div class="author">by haker_one</div>
    </div>
    <script>
        let seconds = 0;
        setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            document.getElementById('timer').textContent = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    </script>
</body>
</html>

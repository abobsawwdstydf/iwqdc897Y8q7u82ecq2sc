services:
  # Backend service (Server + Database + Frontend)
  - type: web
    name: Nexo-messenger
    env: node
    region: frankfurt
    plan: free
    branch: main
    rootDir: .
    buildCommand: npm install && npm run build && cd apps/server && npx prisma migrate deploy && npx prisma db seed
    startCommand: node apps/server/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: Nexo-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: MAX_REGISTRATIONS_PER_IP
        value: "5"
      - key: PORT
        value: "3001"

databases:
  - name: Nexo-db
    databaseName: Nexo
    user: Nexo
    plan: free
    region: frankfurt

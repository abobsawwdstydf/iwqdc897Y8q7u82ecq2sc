# ============================================
# Render.com Configuration
# ============================================

services:
  # Web Service
  - type: web
    name: nexo-messenger
    env: node
    region: frankfurt
    plan: starter
    buildCommand: npm install && NODE_OPTIONS="--max-old-space-size=2048" npm run build
    startCommand: node apps/server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: MASTER_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: MAX_REGISTRATIONS_PER_IP
        value: 22
      - key: MAX_FILE_SIZE
        value: 53687091200
      - key: CHUNK_SIZE
        value: 19922944
      - key: DB_ENCRYPTION_ENABLED
        value: "true"
      - key: TELEGRAM_BOT_TOKENS
        sync: false
      - key: TELEGRAM_CHANNEL_IDS
        sync: false
      - key: DISCORD_WEBHOOK_URLS
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false
